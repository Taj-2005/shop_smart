apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-client
  labels:
    app: shopsmart-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopsmart-client
  template:
    metadata:
      labels:
        app: shopsmart-client
    spec:
      containers:
        - name: client
          image: PLACEHOLDER_CLIENT_IMAGE
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: shopsmart-client
spec:
  type: NodePort
  selector:
    app: shopsmart-client
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      protocol: TCP
