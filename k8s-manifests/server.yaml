apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-server
  labels:
    app: shopsmart-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopsmart-server
  template:
    metadata:
      labels:
        app: shopsmart-server
    spec:
      containers:
        - name: server
          image: PLACEHOLDER_SERVER_IMAGE
          ports:
            - containerPort: 4000
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: shopsmart-server
spec:
  type: NodePort
  selector:
    app: shopsmart-server
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30400
      protocol: TCP
