name: Infra + deploy (Terraform + EKS)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'shopsmart' }}
  DEPLOY_ENV: ${{ vars.DEPLOY_ENV || 'dev' }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  INFRA_NAME: ${{ format('{0}-{1}', vars.PROJECT_NAME || 'shopsmart', vars.DEPLOY_ENV || 'dev') }}

jobs:
  infra_and_deploy:
    name: Apply Terraform, build/push images, deploy to EKS
    runs-on: ubuntu-latest
    env:
      SHOPSMART_ENV: ${{ secrets.SHOPSMART_ENV }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve LabRole ARN
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws iam get-role --role-name "LabRole" >/dev/null 2>&1 || { echo "LabRole not found in this account"; exit 1; }
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/LabRole"
          echo "LABROLE_ARN=${ROLE_ARN}" >> "$GITHUB_ENV"
          echo "TF_VAR_labrole_arn=${ROLE_ARN}" >> "$GITHUB_ENV"
          echo "ACCOUNT_ID=${ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"

      - name: Write .env files from SHOPSMART_ENV
        run: |
          set -euo pipefail
          test -n "${SHOPSMART_ENV}" || { echo "SHOPSMART_ENV secret is not set"; exit 1; }
          echo "${SHOPSMART_ENV}" | jq -e 'type == "object" and (.server|type == "string") and (.client|type == "string")' >/dev/null
          echo "${SHOPSMART_ENV}" | jq -r '.server' > server/.env
          echo "${SHOPSMART_ENV}" | jq -r '.client' > client/.env

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform init (no remote backend)
        working-directory: iac-terraform-eks
        run: terraform init -backend=false -input=false

      - name: Import existing infrastructure into Terraform state
        working-directory: iac-terraform-eks
        run: |
          set -euo pipefail
          # Import each resource if it already exists so that terraform apply
          # is a no-op when nothing has changed (idempotent runs).
          # stderr is redirected to stdout so import errors are visible in the
          # workflow log even though the step still succeeds (first run = no resources yet).
          terraform import aws_eks_cluster.this "${INFRA_NAME}-eks"                     2>&1 || true
          terraform import aws_eks_node_group.this \
            "${INFRA_NAME}-eks:${INFRA_NAME}-nodes"                                     2>&1 || true
          terraform import aws_ecr_repository.server "${INFRA_NAME}-server"             2>&1 || true
          terraform import aws_ecr_repository.client "${INFRA_NAME}-client"             2>&1 || true

          # Import NodePort security-group rules if the EKS cluster (and its SG) already exist.
          # The aws_security_group_rule import ID is deterministic:
          #   <sg-id>_ingress_tcp_<from>_<to>_<cidr>
          SG_ID=$(aws eks describe-cluster --name "${INFRA_NAME}-eks" \
            --query 'cluster.resourcesVpcConfig.clusterSecurityGroupId' \
            --output text 2>/dev/null || echo "")
          if [ -n "${SG_ID}" ] && [ "${SG_ID}" != "None" ]; then
            SERVER_PORT="${TF_VAR_server_nodeport:-30400}"
            CLIENT_PORT="${TF_VAR_client_nodeport:-30300}"
            terraform import aws_security_group_rule.nodeport_server \
              "${SG_ID}_ingress_tcp_${SERVER_PORT}_${SERVER_PORT}_0.0.0.0/0"            2>&1 || true
            terraform import aws_security_group_rule.nodeport_client \
              "${SG_ID}_ingress_tcp_${CLIENT_PORT}_${CLIENT_PORT}_0.0.0.0/0"            2>&1 || true
          fi

      - name: Terraform plan
        working-directory: iac-terraform-eks
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Terraform apply
        working-directory: iac-terraform-eks
        run: terraform apply -no-color -input=false -auto-approve tfplan

      - name: Configure kubectl
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${INFRA_NAME}-eks"

      - name: Resolve image tags
        id: meta
        run: |
          set -euo pipefail
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "server_image=${ECR_REGISTRY}/${INFRA_NAME}-server:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "client_image=${ECR_REGISTRY}/${INFRA_NAME}-client:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "server_latest=${ECR_REGISTRY}/${INFRA_NAME}-server:latest" >> "$GITHUB_OUTPUT"
          echo "client_latest=${ECR_REGISTRY}/${INFRA_NAME}-client:latest" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Resolve NEXT_PUBLIC_API_URL for client build (from client/.env)
        id: api
        run: |
          set -euo pipefail
          set -a
          source client/.env
          set +a
          test -n "${NEXT_PUBLIC_API_URL:-}" || { echo "NEXT_PUBLIC_API_URL is missing in client/.env"; exit 1; }
          echo "public_api_base=${NEXT_PUBLIC_API_URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        env:
          SERVER_IMAGE: ${{ steps.meta.outputs.server_image }}
          SERVER_LATEST: ${{ steps.meta.outputs.server_latest }}
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          set -euo pipefail
          docker build -t "shopsmart-server:${SHA}" ./server
          docker tag "shopsmart-server:${SHA}" "${SERVER_IMAGE}"
          docker tag "shopsmart-server:${SHA}" "${SERVER_LATEST}"
          docker push "${SERVER_IMAGE}"
          docker push "${SERVER_LATEST}"

      - name: Build and push client image
        env:
          CLIENT_IMAGE: ${{ steps.meta.outputs.client_image }}
          CLIENT_LATEST: ${{ steps.meta.outputs.client_latest }}
          SHA: ${{ steps.meta.outputs.sha }}
          NEXT_PUBLIC_API_URL: ${{ steps.api.outputs.public_api_base }}
        run: |
          set -euo pipefail
          docker build --build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" -t "shopsmart-client:${SHA}" ./client
          docker tag "shopsmart-client:${SHA}" "${CLIENT_IMAGE}"
          docker tag "shopsmart-client:${SHA}" "${CLIENT_LATEST}"
          docker push "${CLIENT_IMAGE}"
          docker push "${CLIENT_LATEST}"

      - name: Deploy manifests to EKS
        env:
          SERVER_IMAGE: ${{ steps.meta.outputs.server_image }}
          CLIENT_IMAGE: ${{ steps.meta.outputs.client_image }}
        run: |
          set -euo pipefail
          sed "s|PLACEHOLDER_SERVER_IMAGE|${SERVER_IMAGE}|g" k8s-manifests/server.yaml | kubectl apply -f -
          sed "s|PLACEHOLDER_CLIENT_IMAGE|${CLIENT_IMAGE}|g" k8s-manifests/client.yaml | kubectl apply -f -
          kubectl rollout status deployment/shopsmart-server --timeout=300s
          kubectl rollout status deployment/shopsmart-client --timeout=300s

      - name: Print NodePort access URLs
        run: |
          set -euo pipefail
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}' 2>/dev/null || true)
          if [ -z "${NODE_IP}" ]; then
            NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          fi
          echo "API server : http://${NODE_IP}:30400/api/health"
          echo "Client     : http://${NODE_IP}:30300"
