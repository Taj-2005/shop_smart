name: Deploy only (build/push + ECS rolling update)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'shopsmart' }}
  DEPLOY_ENV: ${{ vars.DEPLOY_ENV || 'dev' }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  INFRA_NAME: ${{ format('{0}-{1}', vars.PROJECT_NAME || 'shopsmart', vars.DEPLOY_ENV || 'dev') }}

jobs:
  deploy:
    name: Build/push images and deploy to ECS
    runs-on: ubuntu-latest
    env:
      SHOPSMART_ENV: ${{ secrets.SHOPSMART_ENV }}
    steps:
      - uses: actions/checkout@v4

      - name: Write .env files from SHOPSMART_ENV
        run: |
          set -euo pipefail
          test -n "${SHOPSMART_ENV}" || { echo "SHOPSMART_ENV secret is not set"; exit 1; }
          echo "${SHOPSMART_ENV}" | jq -e 'type == "object" and (.server|type == "string") and (.client|type == "string")' >/dev/null
          echo "${SHOPSMART_ENV}" | jq -r '.server' > server/.env
          echo "${SHOPSMART_ENV}" | jq -r '.client' > client/.env

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve LabRole ARN (no repo vars)
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws iam get-role --role-name "LabRole" >/dev/null 2>&1 || { echo "LabRole not found in this account"; exit 1; }
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/LabRole"
          echo "LABROLE_ARN=${ROLE_ARN}" >> "$GITHUB_ENV"

      - name: Resolve image tags and ECR URIs
        id: meta
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "server_uri=${REGISTRY}/${INFRA_NAME}-server" >> "$GITHUB_OUTPUT"
          echo "client_uri=${REGISTRY}/${INFRA_NAME}-client" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repos exist (idempotent)
        env:
          SERVER_REPO: ${{ env.INFRA_NAME }}-server
          CLIENT_REPO: ${{ env.INFRA_NAME }}-client
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$SERVER_REPO" >/dev/null 2>&1 || aws ecr create-repository --repository-name "$SERVER_REPO" >/dev/null
          aws ecr describe-repositories --repository-names "$CLIENT_REPO" >/dev/null 2>&1 || aws ecr create-repository --repository-name "$CLIENT_REPO" >/dev/null

      - name: Resolve NEXT_PUBLIC_API_URL for client build (from client/.env)
        id: api
        run: |
          set -euo pipefail
          set -a
          source client/.env
          set +a
          test -n "${NEXT_PUBLIC_API_URL:-}" || { echo "NEXT_PUBLIC_API_URL is missing in client/.env"; exit 1; }
          echo "public_api_base=${NEXT_PUBLIC_API_URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        env:
          SERVER_URI: ${{ steps.meta.outputs.server_uri }}
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          set -euo pipefail
          docker build -t "shopsmart-server:${SHA}" ./server
          docker tag "shopsmart-server:${SHA}" "${SERVER_URI}:${SHA}"
          docker tag "shopsmart-server:${SHA}" "${SERVER_URI}:latest"
          docker push "${SERVER_URI}:${SHA}"
          docker push "${SERVER_URI}:latest"

      - name: Build and push client image
        env:
          CLIENT_URI: ${{ steps.meta.outputs.client_uri }}
          SHA: ${{ steps.meta.outputs.sha }}
          NEXT_PUBLIC_API_URL: ${{ steps.api.outputs.public_api_base }}
        run: |
          set -euo pipefail
          docker build --build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" -t "shopsmart-client:${SHA}" ./client
          docker tag "shopsmart-client:${SHA}" "${CLIENT_URI}:${SHA}"
          docker tag "shopsmart-client:${SHA}" "${CLIENT_URI}:latest"
          docker push "${CLIENT_URI}:${SHA}"
          docker push "${CLIENT_URI}:latest"

      - name: Register task definitions and rolling-update ECS services
        env:
          SHA: ${{ steps.meta.outputs.sha }}
          SERVER_URI: ${{ steps.meta.outputs.server_uri }}
          CLIENT_URI: ${{ steps.meta.outputs.client_uri }}
        run: |
          set -euo pipefail

          VPC_ID=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true --query 'Vpcs[0].VpcId' --output text)
          SUBNET_IDS=$(aws ec2 describe-subnets --filters Name=vpc-id,Values="${VPC_ID}" --query 'Subnets[].SubnetId' --output text)
          SUBNET_A=$(echo "${SUBNET_IDS}" | awk '{print $1}')
          SUBNET_B=$(echo "${SUBNET_IDS}" | awk '{print $2}')

          ensure_sg() {
            local name="$1" port="$2"
            SG_ID=$(aws ec2 describe-security-groups \
              --filters Name=vpc-id,Values="${VPC_ID}" Name=group-name,Values="${name}" \
              --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
            if [ -z "${SG_ID}" ] || [ "${SG_ID}" = "None" ]; then
              SG_ID=$(aws ec2 create-security-group --vpc-id "${VPC_ID}" --group-name "${name}" --description "${name}" --query GroupId --output text)
            fi
            aws ec2 authorize-security-group-ingress --group-id "${SG_ID}" --protocol tcp --port "${port}" --cidr 0.0.0.0/0 2>/dev/null || true
            aws ec2 authorize-security-group-egress --group-id "${SG_ID}" --ip-permissions '[{"IpProtocol":"-1","IpRanges":[{"CidrIp":"0.0.0.0/0"}]}]' 2>/dev/null || true
            echo "${SG_ID}"
          }

          API_SG=$(ensure_sg "${INFRA_NAME}-ecs-api" "4000")
          WEB_SG=$(ensure_sg "${INFRA_NAME}-ecs-client" "3000")

          aws ecs describe-clusters --clusters "${INFRA_NAME}-cluster" --query 'clusters[0].clusterArn' --output text >/dev/null 2>&1 \
            || aws ecs create-cluster --cluster-name "${INFRA_NAME}-cluster" >/dev/null

          for LG in "/ecs/${INFRA_NAME}-api" "/ecs/${INFRA_NAME}-client"; do
            aws logs describe-log-groups --log-group-name-prefix "${LG}" --query 'logGroups[?logGroupName==`'"${LG}"'`].logGroupName' --output text | grep -q "${LG}" \
              || aws logs create-log-group --log-group-name "${LG}" >/dev/null
          done

          ensure_service() {
            local service="$1" family="$2" sg="$3"
            aws ecs describe-services --cluster "${INFRA_NAME}-cluster" --services "${service}" --query 'services[0].status' --output text 2>/dev/null | grep -q "ACTIVE" && return 0
            aws ecs create-service \
              --cluster "${INFRA_NAME}-cluster" \
              --service-name "${service}" \
              --task-definition "${family}" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${SUBNET_A},${SUBNET_B}],securityGroups=[${sg}],assignPublicIp=ENABLED}" \
              >/dev/null
          }

          register_deploy() {
            local family="$1" image="$2" envfile="$3" service="$4"
            test -f "${envfile}" || { echo "Missing env file: ${envfile}"; exit 1; }
            # Build ECS env list JSON: [{name,value}, ...] from the .env file ONLY
            ENV_JSON=$(python3 .github/scripts/dotenv_to_ecs_env.py "${envfile}")
            # Debug without leaking secret values
            echo "ENV_JSON(${envfile}) count=$(printf '%s' "${ENV_JSON}" | jq -r 'length') keys=$(printf '%s' "${ENV_JSON}" | jq -r '.[].name' | paste -sd, -)"
            printf '%s' "${ENV_JSON}" | jq -e 'type=="array" and all(.[]; type=="object" and has("name") and has("value"))' >/dev/null

            if aws ecs describe-task-definition --task-definition "${family}" >/dev/null 2>&1; then
              TD=$(aws ecs describe-task-definition --task-definition "${family}" --query taskDefinition --output json)
              echo "${TD}" | jq --arg IMG "${image}" --argjson ENV "${ENV_JSON}" '
                del(
                  .taskDefinitionArn,
                  .revision,
                  .status,
                  .requiresAttributes,
                  .compatibilities,
                  .registeredAt,
                  .registeredBy,
                  .deregisteredAt,
                  .enableFaultInjection
                )
                | walk(if type == "object" then with_entries(select(.value != null)) else . end)
                | .requiresCompatibilities = ["FARGATE"]
                | .containerDefinitions[0].image = $IMG
                | .containerDefinitions[0].environment = $ENV
                | .containerDefinitions[0] |= del(.command)
              ' > /tmp/td.json
            else
              local container_name="api"
              local container_port="4000"
              local log_group="/ecs/${INFRA_NAME}-api"
              if [ "${family}" = "${INFRA_NAME}-client" ]; then
                container_name="web"
                container_port="3000"
                log_group="/ecs/${INFRA_NAME}-client"
              fi
              printf '%s' "${ENV_JSON}" > /tmp/env_bootstrap.json
              python3 -c 'import json,os; env=json.load(open("/tmp/env_bootstrap.json")); family=os.environ["FAMILY"]; image=os.environ["IMAGE"]; name=os.environ["CONTAINER_NAME"]; port=int(os.environ["CONTAINER_PORT"]); lg=os.environ["LOG_GROUP"]; region=os.environ["AWS_REGION"]; role=os.environ["LABROLE_ARN"]; td={"family":family,"networkMode":"awsvpc","requiresCompatibilities":["FARGATE"],"cpu":"512","memory":"1024","executionRoleArn":role,"taskRoleArn":role,"containerDefinitions":[{"name":name,"image":image,"essential":True,"portMappings":[{"containerPort":port,"protocol":"tcp"}],"environment":env,"logConfiguration":{"logDriver":"awslogs","options":{"awslogs-group":lg,"awslogs-region":region,"awslogs-stream-prefix":name}}}]}; open("/tmp/td.json","w").write(json.dumps(td))' \
                FAMILY="${family}" IMAGE="${image}" CONTAINER_NAME="${container_name}" CONTAINER_PORT="${container_port}" LOG_GROUP="${log_group}"
            fi

            # Guard: environment must be ECS list format
            jq -e '.containerDefinitions[0].environment | type == "array"' /tmp/td.json >/dev/null
            jq -e '.containerDefinitions[0].environment | all(.[]; (type=="object" and (.name|type=="string") and (.value|type=="string")))' /tmp/td.json >/dev/null
            echo "td.env.length=$(jq -r '.containerDefinitions[0].environment | length' /tmp/td.json)"

            aws ecs register-task-definition --cli-input-json file:///tmp/td.json > /tmp/reg.json
            ARN=$(jq -r '.taskDefinition.taskDefinitionArn' /tmp/reg.json)

            if [ "${service}" = "${INFRA_NAME}-api" ]; then
              ensure_service "${service}" "${family}" "${API_SG}"
            else
              ensure_service "${service}" "${family}" "${WEB_SG}"
            fi

            aws ecs update-service \
              --cluster "${INFRA_NAME}-cluster" \
              --service "${service}" \
              --task-definition "${ARN}" \
              --force-new-deployment
          }

          register_deploy "${INFRA_NAME}-api" "${SERVER_URI}:${SHA}" server/.env "${INFRA_NAME}-api"
          register_deploy "${INFRA_NAME}-client" "${CLIENT_URI}:${SHA}" client/.env "${INFRA_NAME}-client"

      - name: Wait for ECS services to stabilize
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "${INFRA_NAME}-cluster" \
            --services "${INFRA_NAME}-api" "${INFRA_NAME}-client"

