# Manual pipeline: lint → unit tests → build, push to ECR, rolling ECS deploy.
# Trigger: Actions → "CI and deploy" → Run workflow (workflow_dispatch only).
#
# Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY — ECR, ECS, SSM, iam:PassRole
#   AWS_SESSION_TOKEN — optional (temporary credentials)
#   SHOPSMART_ENV — JSON: {"server":"...dotenv...","client":"...dotenv..."}
#
# Optional repository variables: PROJECT_NAME, DEPLOY_ENV, AWS_REGION (defaults in env block below).
# INFRA_NAME = "${PROJECT_NAME}-${DEPLOY_ENV}" must match Terraform `local.name`.

name: CI and deploy (legacy)

on:
  workflow_dispatch:
  push:
    branches-ignore: ["**"]

permissions:
  contents: read

env:
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'shopsmart' }}
  DEPLOY_ENV: ${{ vars.DEPLOY_ENV || 'dev' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform format (check)
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init (local)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Client ESLint
        working-directory: client
        run: npm run lint

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Server ESLint
        working-directory: server
        run: npm run lint

  unit_tests:
    name: Unit tests
    needs: [lint]
    runs-on: ubuntu-latest
    env:
      SHOPSMART_ENV: ${{ secrets.SHOPSMART_ENV }}
    steps:
      - uses: actions/checkout@v4

      - name: Write .env files from SHOPSMART_ENV
        run: |
          test -n "${SHOPSMART_ENV}" || { echo "SHOPSMART_ENV secret is not set"; exit 1; }
          echo "${SHOPSMART_ENV}" | jq -e 'type == "object" and (.server|type == "string") and (.client|type == "string")' >/dev/null
          echo "${SHOPSMART_ENV}" | jq -r '.server' > server/.env
          echo "${SHOPSMART_ENV}" | jq -r '.client' > client/.env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Server — install, prisma, unit tests
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npm run test -- --testPathIgnorePatterns=integration --json --outputFile=test-results.json

      - name: Upload server unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-unit-test-results
          path: server/test-results.json

      - name: Client — install, unit tests
        working-directory: client
        run: |
          npm ci
          npm run test -- --passWithNoTests --json --outputFile=test-results.json

      - name: Upload client unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-unit-test-results
          path: client/test-results.json

  deploy:
    name: Build, push, deploy to ECS
    needs: [unit_tests]
    runs-on: ubuntu-latest
    env:
      SHOPSMART_ENV: ${{ secrets.SHOPSMART_ENV }}
      INFRA_NAME: ${{ format('{0}-{1}', vars.PROJECT_NAME || 'shopsmart', vars.DEPLOY_ENV || 'dev') }}
    steps:
      - uses: actions/checkout@v4

      - name: Write .env files from SHOPSMART_ENV
        run: |
          test -n "${SHOPSMART_ENV}" || { echo "SHOPSMART_ENV secret is not set"; exit 1; }
          echo "${SHOPSMART_ENV}" | jq -e 'type == "object" and (.server|type == "string") and (.client|type == "string")' >/dev/null
          echo "${SHOPSMART_ENV}" | jq -r '.server' > server/.env
          echo "${SHOPSMART_ENV}" | jq -r '.client' > client/.env

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tags and ECR URIs
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "server_uri=${REGISTRY}/${INFRA_NAME}-server" >> "$GITHUB_OUTPUT"
          echo "client_uri=${REGISTRY}/${INFRA_NAME}-client" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve public API base for client build
        id: api
        run: |
          PARAM="/${PROJECT_NAME}/${DEPLOY_ENV}/public_api_base_url"
          BASE=$(aws ssm get-parameter --name "${PARAM}" --query Parameter.Value --output text)
          echo "public_api_base=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        env:
          SERVER_URI: ${{ steps.meta.outputs.server_uri }}
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          docker build -t "shopsmart-server:${SHA}" ./server
          docker tag "shopsmart-server:${SHA}" "${SERVER_URI}:${SHA}"
          docker tag "shopsmart-server:${SHA}" "${SERVER_URI}:latest"
          docker push "${SERVER_URI}:${SHA}"
          docker push "${SERVER_URI}:latest"

      - name: Build and push client image
        env:
          CLIENT_URI: ${{ steps.meta.outputs.client_uri }}
          SHA: ${{ steps.meta.outputs.sha }}
          NEXT_PUBLIC_API_URL: ${{ steps.api.outputs.public_api_base }}
        run: |
          docker build \
            --build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            -t "shopsmart-client:${SHA}" ./client
          docker tag "shopsmart-client:${SHA}" "${CLIENT_URI}:${SHA}"
          docker tag "shopsmart-client:${SHA}" "${CLIENT_URI}:latest"
          docker push "${CLIENT_URI}:${SHA}"
          docker push "${CLIENT_URI}:latest"

      - name: Register task definitions and rolling-update ECS services
        env:
          SHA: ${{ steps.meta.outputs.sha }}
          SERVER_URI: ${{ steps.meta.outputs.server_uri }}
          CLIENT_URI: ${{ steps.meta.outputs.client_uri }}
        run: |
          set -euo pipefail
          register_deploy() {
            local family="$1" image="$2" envfile="$3" service="$4"
            TD=$(aws ecs describe-task-definition --task-definition "${family}" --query taskDefinition --output json)
            ENV_JSON=$(python3 .github/scripts/dotenv_to_ecs_env.py "${envfile}")
            echo "${TD}" | jq --arg IMG "${image}" --argjson ENV "${ENV_JSON}" '
              del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .deregisteredAt,
                .enableFaultInjection
              )
              | walk(if type == "object" then with_entries(select(.value != null)) else . end)
              | .requiresCompatibilities = ["FARGATE"]
              | .containerDefinitions[0].image = $IMG
              | .containerDefinitions[0].environment = $ENV
              | .containerDefinitions[0] |= del(.command)
            ' > /tmp/td.json
            aws ecs register-task-definition --cli-input-json file:///tmp/td.json > /tmp/reg.json
            ARN=$(jq -r '.taskDefinition.taskDefinitionArn' /tmp/reg.json)
            aws ecs update-service \
              --cluster "${INFRA_NAME}-cluster" \
              --service "${service}" \
              --task-definition "${ARN}" \
              --force-new-deployment
          }
          register_deploy "${INFRA_NAME}-api" "${SERVER_URI}:${SHA}" server/.env "${INFRA_NAME}-api"
          register_deploy "${INFRA_NAME}-client" "${CLIENT_URI}:${SHA}" client/.env "${INFRA_NAME}-client"

      - name: Wait for ECS services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${INFRA_NAME}-cluster" \
            --services "${INFRA_NAME}-api" "${INFRA_NAME}-client"
