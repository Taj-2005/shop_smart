name: Integration tests

on:
  push:
    branches: [main, develop]
    paths: ["server/**", ".github/workflows/integration-tests.yml"]
  pull_request:
    branches: [main, develop]
    paths: ["server/**", ".github/workflows/integration-tests.yml"]

env:
  SHOPSMART_ENV: ${{ secrets.SHOPSMART_ENV }}

jobs:
  server-integration:
    name: Server API integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Write .env from SHOPSMART_ENV
        run: |
          test -n "${SHOPSMART_ENV}" || { echo "SHOPSMART_ENV secret is not set"; exit 1; }
          echo "${SHOPSMART_ENV}" | jq -e '.server | type == "string"' >/dev/null
          echo "${SHOPSMART_ENV}" | jq -r '.server' > .env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma db push --accept-data-loss

      - name: Run integration tests
        run: npx jest --runInBand --forceExit --testPathPattern=integration
