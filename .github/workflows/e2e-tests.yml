name: E2E tests

on:
  push:
    branches: [main, develop]
    paths: ["server/**", "client/**", "e2e/**", ".github/workflows/e2e-tests.yml"]
  pull_request:
    branches: [main, develop]
    paths: ["server/**", "client/**", "e2e/**", ".github/workflows/e2e-tests.yml"]

env:
  DOTENV: ${{ secrets.DOTENV }}

jobs:
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env files
        run: |
          printf '%s\n' "${DOTENV}" > server/.env
          printf '%s\n' "${DOTENV}" > client/.env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Generate Prisma client & push schema
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss
        working-directory: server

      - name: Build server
        run: npm run build
        working-directory: server

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Install Playwright (e2e)
        run: |
          npm install
          npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start server and client, run E2E
        run: |
          set -a
          source server/.env
          set +a
          (cd server && npm run start) &
          sleep 3
          (cd client && PORT=3000 npm run start) &
          sleep 10
          cd e2e && BASE_URL=http://localhost:3000 API_URL=${NEXT_PUBLIC_API_URL} npm run e2e
        timeout-minutes: 5
